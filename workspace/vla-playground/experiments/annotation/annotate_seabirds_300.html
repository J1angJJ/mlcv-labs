<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seabirds CLIP Manifest Annotator</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f4f5f7;
      color: #1f2933;
    }
    body { margin: 0; }
    header {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: #17202a;
      color: white;
    }
    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 14px;
      padding: 14px;
      height: calc(100vh - 80px);
      box-sizing: border-box;
    }
    .viewer, .panel {
      background: white;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      overflow: hidden;
    }
    .viewer {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }
    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .panel {
      padding: 14px;
      overflow: auto;
    }
    .meta {
      font-size: 12px;
      color: #52616f;
      line-height: 1.45;
      word-break: break-all;
      margin-bottom: 10px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #334155;
      margin: 10px 0 4px;
    }
    select, input, textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 7px 8px;
      font-size: 13px;
      background: white;
    }
    textarea {
      min-height: 72px;
      resize: vertical;
    }
    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    button {
      border: 1px solid #b8c2cc;
      border-radius: 6px;
      padding: 8px 10px;
      background: #f8fafc;
      cursor: pointer;
      font-weight: 600;
    }
    button.primary {
      background: #2563eb;
      border-color: #1d4ed8;
      color: white;
    }
    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #64748b;
      line-height: 1.45;
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; height: auto; }
      .viewer { height: 55vh; }
    }
  </style>
</head>
<body>
  <header>
    <div>Seabirds CLIP Manifest Annotator</div>
    <div id="progress"></div>
  </header>
  <main>
    <section class="viewer">
      <img id="image" alt="current sample">
    </section>
    <aside class="panel">
      <div class="meta" id="meta"></div>

      <label for="distance">distance</label>
      <select id="distance">
        <option value=""></option>
        <option>far</option>
        <option>medium</option>
        <option>close</option>
        <option>unknown</option>
      </select>

      <label for="scene">scene</label>
      <select id="scene">
        <option value=""></option>
        <option>rocky_cliff</option>
        <option>sea</option>
        <option>grass</option>
        <option>sky</option>
        <option>mixed</option>
        <option>unknown</option>
      </select>

      <label for="difficulty">difficulty</label>
      <select id="difficulty">
        <option value=""></option>
        <option>easy</option>
        <option>medium</option>
        <option>hard</option>
        <option>uncertain</option>
      </select>

      <label for="contains_puffin">contains_puffin</label>
      <select id="contains_puffin">
        <option>yes</option>
        <option>no</option>
        <option>uncertain</option>
      </select>

      <label for="density">density</label>
      <select id="density">
        <option value=""></option>
        <option>none</option>
        <option>single</option>
        <option>few</option>
        <option>group</option>
        <option>crowded</option>
        <option>unknown</option>
      </select>

      <label for="occlusion">occlusion</label>
      <select id="occlusion">
        <option value=""></option>
        <option>none</option>
        <option>partial</option>
        <option>heavy</option>
        <option>unknown</option>
      </select>

      <label for="has_detection_overlay">has_detection_overlay</label>
      <select id="has_detection_overlay">
        <option>no</option>
        <option>yes</option>
      </select>

      <label for="text_prompt">text_prompt</label>
      <textarea id="text_prompt"></textarea>

      <label for="notes">notes</label>
      <textarea id="notes"></textarea>

      <div class="buttons">
        <button id="prev">Prev</button>
        <button id="next">Next</button>
        <button id="saveLocal">Save local draft</button>
        <button class="primary" id="download">Download CSV</button>
      </div>
      <div class="hint">
        快捷键：A/← 上一张，D/→ 下一张。浏览器不能直接覆盖本地 CSV；完成后点击 Download CSV，再替换 manifest 文件。
      </div>
    </aside>
  </main>

    const storageKey = "seabirds_annotation_300_v1";
    const editableFields = ["distance", "scene", "difficulty", "contains_puffin", "density", "occlusion", "has_detection_overlay", "text_prompt", "notes"];
    let index = 0;

    const saved = localStorage.getItem(storageKey);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed) && parsed.length === rows.length) {
          for (let i = 0; i < rows.length; i++) Object.assign(rows[i], parsed[i]);
        }
      } catch (error) {
        console.warn(error);
      }
    }

    function current() { return rows[index]; }

    function setValue(id, value) {
      document.getElementById(id).value = value || "";
    }

    function readForm() {
      const row = current();
      for (const field of editableFields) row[field] = document.getElementById(field).value;
    }

    function render() {
      const row = current();
      document.getElementById("progress").textContent = `${index + 1} / ${rows.length}`;
      document.getElementById("image").src = row.image_uri;
      document.getElementById("meta").innerHTML = `
        <strong>${escapeHtml(row.image_id)}</strong><br>
        split=${escapeHtml(row.split)} | puffin_boxes=${escapeHtml(row.puffin_boxes)} | total_boxes=${escapeHtml(row.total_boxes)} | bin=${escapeHtml(row.puffin_bin)}<br>
        ${escapeHtml(row.image_path)}
      `;
      for (const field of editableFields) setValue(field, row[field]);
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function move(delta) {
      readForm();
      index = Math.max(0, Math.min(rows.length - 1, index + delta));
      render();
    }

    function saveLocal() {
      readForm();
      localStorage.setItem(storageKey, JSON.stringify(rows));
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      if (/[",\r\n]/.test(text)) return `"${text.replace(/"/g, '""')}"`;
      return text;
    }

    function downloadCsv() {
      readForm();
      saveLocal();
      const lines = [fields.join(",")];
      for (const row of rows) lines.push(fields.map(field => csvEscape(row[field])).join(","));
      const blob = new Blob([lines.join("\r\n") + "\r\n"], { type: "text/csv;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "seabirds_annotation_300_annotated.csv";
      link.click();
      URL.revokeObjectURL(link.href);
    }

    document.getElementById("prev").addEventListener("click", () => move(-1));
    document.getElementById("next").addEventListener("click", () => move(1));
    document.getElementById("saveLocal").addEventListener("click", saveLocal);
    document.getElementById("download").addEventListener("click", downloadCsv);
    document.addEventListener("keydown", event => {
      if (event.target.tagName === "TEXTAREA" || event.target.tagName === "INPUT" || event.target.tagName === "SELECT") return;
      if (event.key === "ArrowLeft" || event.key.toLowerCase() === "a") move(-1);
      if (event.key === "ArrowRight" || event.key.toLowerCase() === "d") move(1);
    });

    render();
  </script>
